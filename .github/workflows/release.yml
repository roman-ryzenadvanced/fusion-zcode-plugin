name: Release

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '0.1.0/package.json'
      - name: Install dependencies
        working-directory: 0.1.0
        run: npm install
      - name: Build
        working-directory: 0.1.0
        run: npm run build
      - name: Typecheck
        working-directory: 0.1.0
        run: npm run typecheck
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fusion-plugin
          path: 0.1.0/dist/
